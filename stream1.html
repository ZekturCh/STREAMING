<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CCTC 2026 – Vista Cámaras</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --yellow: #FFE600;
      --pink:   #FF2B9D;
      --blue:   #3B3FE8;
      --black:  #050505;
      --white:  #ffffff;
    }
    body {
      min-height: 100vh;
      font-family: Impact, 'Arial Narrow', Arial, sans-serif;
      background: var(--black);
      display: flex; flex-direction: column; align-items: center;
      position: relative;
      overflow-x: hidden; overflow-y: auto;
      padding-bottom: 48px;
    }
 
    /* FONDO */
    .bg-image {
      position: fixed; inset: 0;
      background: url('fondo2.webp') center center / cover no-repeat;
      opacity: 0.42; z-index: 0;
    }
    .bg-overlay {
      position: fixed; inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.65) 100%);
      z-index: 1;
    }
 
    /* BLOBS */
    .blob { position: fixed; border-radius: 50%; filter: blur(60px); z-index: 2; pointer-events: none; }
    .blob-purple { width: 240px; height: 240px; background: rgba(120,40,200,0.35); bottom: 15%; left: -60px; }
    .blob-red    { width: 180px; height: 180px; background: rgba(200,30,80,0.3); top: 40%; right: -40px; }
 
    /* HUELLA */
    .tire-track {
      position: fixed; bottom: 0; left: 0; right: 0; height: 200px; z-index: 2; pointer-events: none;
      background: repeating-linear-gradient(-15deg, transparent 0px, transparent 12px, rgba(180,30,100,0.07) 12px, rgba(180,30,100,0.07) 18px);
      mask-image: linear-gradient(to top, rgba(0,0,0,0.4) 0%, transparent 100%);
    }
 
    /* CONTENIDO */
    .content {
      position: relative; z-index: 10;
      width: 100%; max-width: 480px;
      display: flex; flex-direction: column; align-items: center;
      padding: 36px 20px 0;
    }
 
    /* LOGOS */
    .logo-cctc { width: 52%; max-width: 210px; margin-bottom: 5px; }
    .logo-200  { width: 78%; max-width: 320px; margin-bottom: 10px; }
    .badge-date {
      background: var(--yellow); color: var(--black);
      font-family: Impact, sans-serif; font-size: 13px; letter-spacing: 2px;
      padding: 5px 20px; border-radius: 4px;
      margin-bottom: 22px; text-transform: uppercase;
    }
 
    /* PLAYER BOX */
    .player-wrap {
      width: 100%;
      border: 2.5px solid var(--pink);
      border-radius: 22px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 0 28px rgba(255,43,157,0.4), 0 0 80px rgba(255,43,157,0.14);
      position: relative;
    }
    .player-inner {
      position: relative; width: 100%;
      padding-bottom: 56.25%;
    }
    .player-inner iframe {
      position: absolute; inset: 0;
      width: 100%; height: 100%; border: none;
    }
    .no-stream {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      background: rgba(0,0,0,0.85);
    }
    .no-stream-icon { font-size: 42px; opacity: .35; }
    .no-stream p {
      font-family: Arial, sans-serif; font-size: 12px;
      letter-spacing: 3px; color: rgba(255,43,157,0.5);
      text-transform: uppercase;
    }
 
    /* CAMBIAR VISTA */
    .switch-section {
      width: 100%;
      display: flex; flex-direction: column; align-items: center;
      margin-top: 22px; gap: 14px;
    }
    .switch-label {
      font-family: Impact, sans-serif;
      font-size: 20px; letter-spacing: 4px;
      color: var(--white); text-transform: uppercase;
      text-shadow: 1px 1px 0 rgba(0,0,0,0.6);
    }
 
    /* TOGGLE PILL */
    .toggle-pill {
      width: 160px; height: 68px;
      border-radius: 60px;
      border: 2.5px solid var(--pink);
      background: rgba(0,0,0,0.6);
      box-shadow: 0 0 20px rgba(255,43,157,0.3);
      display: flex; align-items: center;
      padding: 8px;
      cursor: pointer;
      text-decoration: none;
      transition: box-shadow .2s;
      justify-content: flex-end; /* dot a la derecha = stream1 activo */
    }
    .toggle-pill:hover { box-shadow: 0 0 32px rgba(255,43,157,0.5); }
    .toggle-dot {
      width: 50px; height: 50px; border-radius: 50%;
      background: var(--pink);
      box-shadow: 0 0 16px rgba(255,43,157,0.7);
    }
 
    /* FOOTER IMEKA */
    .footer-imeka {
      position: relative; z-index: 10;
      display: flex; flex-direction: column; align-items: center;
      margin-top: 32px;
    }
    .footer-imeka img { width: 110px; opacity: .9; }
    .footer-sub {
      font-family: Arial, sans-serif; font-size: 9px;
      letter-spacing: 3px; color: rgba(255,255,255,0.3);
      text-transform: uppercase; margin-top: 5px;
    }
  </style>
</head>
<body>
 
  <div class="bg-image"></div>
  <div class="bg-overlay"></div>
  <div class="blob blob-purple"></div>
  <div class="blob blob-red"></div>
  <div class="tire-track"></div>
 
  <div class="content">
 
    <img class="logo-cctc" src="LOGO1.webp"  alt="CCTC 2026"/>
 
    <!-- PLAYER -->
    <div class="player-wrap">
      <div class="player-inner">
        <!--
          ⚠️ REEMPLAZA TU_VIDEO_ID con el ID del stream de YouTube
          Ejemplo: https://www.youtube.com/watch?v=dQw4w9WgXcQ → ID = dQw4w9WgXcQ
        -->
        <iframe
          id="streamFrame"
          src="rtmp://a.rtmp.youtube.com/live2"
          allow="autoplay; fullscreen; picture-in-picture"
          allowfullscreen
          title="Vista Cámaras">
        </iframe>
        <div class="no-stream" id="placeholder">
          <div class="no-stream-icon">📷</div>
          <p>Stream próximamente</p>
        </div>
      </div>
    </div>
 
    <!-- TOGGLE SWITCH → va a stream2 -->
    <div class="switch-section">
      <p class="switch-label">Cambiar Vista</p>
      <a class="toggle-pill" href="stream2.html">
        <div class="toggle-dot"></div>
      </a>
    </div>
 
  </div>
 
  <div class="footer-imeka">
    <img src="ilogo.webp" alt="Imeka"/>
  </div>
 
  <script>
    if (!localStorage.getItem('chutana_user')) {
      window.location.href = 'index.html';
    }
    document.getElementById('streamFrame').addEventListener('load', function() {
      if (!this.getAttribute('src').includes('TU_VIDEO_ID')) {
        document.getElementById('placeholder').style.display = 'none';
      }
    });
  </script>
</body>
</html>
