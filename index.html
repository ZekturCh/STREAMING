<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>La Chutana – Acceso en Vivo</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --neon: #39FF14;
      --neon-dim: rgba(57,255,20,0.18);
      --neon-glow: rgba(57,255,20,0.55);
      --mil-green: #2d4a1e;
      --mil-green-dark: #1a2e10;
      --white: #ffffff;
      --black: #060606;
    }
 
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      background: var(--black);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Rajdhani', sans-serif;
      overflow: hidden;
      position: relative;
    }
 
    /* SPHERE BACKGROUND */
    .bg-sphere {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .bg-sphere::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 680px; height: 680px;
      border-radius: 50%;
      background: radial-gradient(ellipse at center,
        rgba(57,255,20,0.28) 0%,
        rgba(57,255,20,0.13) 30%,
        rgba(57,255,20,0.04) 60%,
        transparent 75%);
      filter: blur(18px);
      animation: pulse-sphere 4s ease-in-out infinite;
    }
    .bg-sphere::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 340px; height: 340px;
      border-radius: 50%;
      background: radial-gradient(ellipse at center,
        rgba(57,255,20,0.18) 0%,
        transparent 70%);
      filter: blur(6px);
      animation: pulse-sphere 4s ease-in-out infinite reverse;
    }
    @keyframes pulse-sphere {
      0%,100% { opacity:1; transform: translate(-50%,-50%) scale(1); }
      50% { opacity:.7; transform: translate(-50%,-50%) scale(1.07); }
    }
 
    /* GRID LINES */
    .grid-lines {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(57,255,20,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(57,255,20,0.04) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
    }
 
    /* CARD */
    .card {
      position: relative;
      z-index: 10;
      width: 420px;
      padding: 48px 40px 40px;
      background: linear-gradient(145deg, rgba(20,35,12,0.92), rgba(6,6,6,0.95));
      border: 1px solid rgba(57,255,20,0.25);
      border-radius: 4px;
      box-shadow:
        0 0 0 1px rgba(57,255,20,0.08),
        0 0 40px rgba(57,255,20,0.12),
        0 0 80px rgba(57,255,20,0.06),
        inset 0 1px 0 rgba(57,255,20,0.15);
      backdrop-filter: blur(20px);
      transform: perspective(900px) rotateX(1deg);
      animation: card-in 0.8s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes card-in {
      from { opacity:0; transform: perspective(900px) rotateX(6deg) translateY(30px); }
      to   { opacity:1; transform: perspective(900px) rotateX(1deg) translateY(0); }
    }
 
    /* CORNER ACCENTS */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 20px; height: 20px;
      border-color: var(--neon);
      border-style: solid;
    }
    .card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
 
    /* LOGO / HEADER */
    .logo-zone {
      text-align: center;
      margin-bottom: 36px;
    }
    .logo-flag {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .flag-bar {
      width: 32px; height: 3px;
      background: linear-gradient(90deg, transparent, var(--neon));
      box-shadow: 0 0 8px var(--neon);
    }
    .flag-bar.right {
      background: linear-gradient(90deg, var(--neon), transparent);
    }
    .logo-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 26px;
      font-weight: 900;
      color: var(--white);
      letter-spacing: 4px;
      text-transform: uppercase;
      text-shadow: 0 0 20px var(--neon-glow), 0 0 40px rgba(57,255,20,0.3);
    }
    .logo-sub {
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 6px;
      color: rgba(57,255,20,0.7);
      text-transform: uppercase;
    }
 
    /* DIVIDER */
    .divider {
      width: 100%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(57,255,20,0.4), transparent);
      margin: 0 0 28px;
    }
 
    /* FORM */
    .form-label {
      display: block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 3px;
      color: rgba(57,255,20,0.8);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .form-group { margin-bottom: 20px; }
 
    input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      background: rgba(57,255,20,0.05);
      border: 1px solid rgba(57,255,20,0.25);
      border-radius: 3px;
      color: var(--white);
      font-family: 'Rajdhani', sans-serif;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 1px;
      outline: none;
      transition: border-color .25s, box-shadow .25s, background .25s;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.4);
    }
    input[type="text"]::placeholder { color: rgba(255,255,255,0.2); font-weight: 300; }
    input[type="text"]:focus {
      border-color: rgba(57,255,20,0.7);
      background: rgba(57,255,20,0.08);
      box-shadow:
        inset 0 1px 3px rgba(0,0,0,0.4),
        0 0 0 3px rgba(57,255,20,0.08),
        0 0 14px rgba(57,255,20,0.12);
    }
 
    /* BUTTON */
    .btn-primary {
      width: 100%;
      padding: 14px 20px;
      margin-top: 8px;
      background: linear-gradient(145deg, var(--mil-green), var(--mil-green-dark));
      border: 1.5px solid rgba(255,255,255,0.85);
      border-radius: 3px;
      color: var(--white);
      font-family: 'Orbitron', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform .15s, box-shadow .25s;
      box-shadow:
        0 4px 20px rgba(0,0,0,0.5),
        0 0 20px rgba(57,255,20,0.1),
        inset 0 1px 0 rgba(255,255,255,0.1);
    }
    .btn-primary::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent);
      transition: left .4s ease;
    }
    .btn-primary:hover::before { left: 150%; }
    .btn-primary:hover {
      box-shadow:
        0 6px 30px rgba(0,0,0,0.6),
        0 0 30px rgba(57,255,20,0.2),
        inset 0 1px 0 rgba(255,255,255,0.15);
      transform: translateY(-2px);
    }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled {
      opacity: .5; cursor: not-allowed; transform: none;
    }
 
    /* STATUS / ERROR */
    .msg {
      margin-top: 14px;
      font-size: 12px;
      letter-spacing: 1px;
      text-align: center;
      min-height: 18px;
    }
    .msg.error { color: #ff4444; }
    .msg.success { color: var(--neon); text-shadow: 0 0 8px var(--neon-glow); }
    .msg.loading { color: rgba(255,255,255,0.4); }
 
    /* RETURNING USER NOTE */
    .returning-note {
      margin-top: 20px;
      padding: 12px 16px;
      border: 1px solid rgba(57,255,20,0.2);
      border-radius: 3px;
      background: rgba(57,255,20,0.04);
      display: none;
    }
    .returning-note p {
      font-size: 13px; color: rgba(255,255,255,0.7);
      letter-spacing: .5px;
    }
    .returning-note strong { color: var(--neon); }
    .btn-continue {
      display: block; width: 100%;
      padding: 11px;
      margin-top: 10px;
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.6);
      border-radius: 3px;
      color: var(--white);
      font-family: 'Orbitron', sans-serif;
      font-size: 11px; letter-spacing: 2px;
      text-transform: uppercase; cursor: pointer;
      transition: background .2s, box-shadow .2s;
      box-shadow: 0 0 10px rgba(57,255,20,0.08);
    }
    .btn-continue:hover {
      background: rgba(57,255,20,0.07);
      box-shadow: 0 0 18px rgba(57,255,20,0.18);
    }
 
    /* FOOTER TAG */
    .footer-tag {
      position: fixed; bottom: 18px; left: 0; right: 0;
      text-align: center;
      font-size: 10px; letter-spacing: 3px;
      color: rgba(57,255,20,0.25);
      text-transform: uppercase;
      z-index: 10;
    }
 
    /* SCAN LINE EFFECT */
    .scanlines {
      position: fixed; inset: 0; z-index: 1;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.07) 3px,
        rgba(0,0,0,0.07) 4px
      );
    }
  </style>
</head>
<body>
 
  <div class="bg-sphere"></div>
  <div class="grid-lines"></div>
  <div class="scanlines"></div>
 
  <div class="card" id="mainCard">
    <div class="logo-zone">
      <div class="logo-flag">
        <span class="flag-bar"></span>
        <span class="logo-title">La Chutana</span>
        <span class="flag-bar right"></span>
      </div>
      <p class="logo-sub">Transmisión en vivo</p>
    </div>
 
    <div class="divider"></div>
 
    <!-- RETURNING USER ZONE -->
    <div class="returning-note" id="returningNote">
      <p>Bienvenido de regreso, <strong id="returningName"></strong></p>
      <button class="btn-continue" onclick="goToSelection()">▶ &nbsp;Continuar al stream</button>
      <button class="btn-continue" style="margin-top:6px; font-size:10px; opacity:.5;" onclick="clearUser()">Ingresar con otro nombre</button>
    </div>
 
    <!-- NEW USER FORM -->
    <div id="formZone">
      <div class="form-group">
        <label class="form-label" for="nombres">Nombres</label>
        <input type="text" id="nombres" placeholder="Ingresa tu nombre" autocomplete="off" />
      </div>
      <div class="form-group">
        <label class="form-label" for="apellidos">Apellidos</label>
        <input type="text" id="apellidos" placeholder="Ingresa tus apellidos" autocomplete="off" />
      </div>
      <button class="btn-primary" id="btnRegistrar" onclick="registrar()">
        Ingresar al stream
      </button>
      <p class="msg" id="statusMsg"></p>
    </div>
  </div>
 
  <p class="footer-tag">© La Chutana Racing — Todos los derechos reservados</p>
 
  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
 
    // ⚠️ REEMPLAZA ESTOS VALORES CON TU CONFIGURACIÓN DE FIREBASE
    const firebaseConfig = {
      apiKey: "TU_API_KEY",
      authDomain: "TU_PROYECTO.firebaseapp.com",
      projectId: "TU_PROYECTO_ID",
      storageBucket: "TU_PROYECTO.appspot.com",
      messagingSenderId: "TU_SENDER_ID",
      appId: "TU_APP_ID"
    };
 
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
 
    // CHECK SI YA SE REGISTRÓ ANTES
    window.addEventListener('DOMContentLoaded', () => {
      const saved = localStorage.getItem('chutana_user');
      if (saved) {
        const user = JSON.parse(saved);
        document.getElementById('formZone').style.display = 'none';
        document.getElementById('returningNote').style.display = 'block';
        document.getElementById('returningName').textContent = user.nombres;
      }
    });
 
    window.goToSelection = () => {
      window.location.href = 'seleccion.html';
    };
 
    window.clearUser = () => {
      localStorage.removeItem('chutana_user');
      document.getElementById('returningNote').style.display = 'none';
      document.getElementById('formZone').style.display = 'block';
    };
 
    window.registrar = async () => {
      const nombres   = document.getElementById('nombres').value.trim();
      const apellidos = document.getElementById('apellidos').value.trim();
      const msg       = document.getElementById('statusMsg');
      const btn       = document.getElementById('btnRegistrar');
 
      if (!nombres || !apellidos) {
        msg.className = 'msg error';
        msg.textContent = 'Por favor completa todos los campos.';
        return;
      }
 
      btn.disabled = true;
      msg.className = 'msg loading';
      msg.textContent = 'Registrando acceso...';
 
      try {
        await addDoc(collection(db, 'espectadores'), {
          nombres,
          apellidos,
          timestamp: serverTimestamp(),
          ua: navigator.userAgent.substring(0, 80)
        });
 
        localStorage.setItem('chutana_user', JSON.stringify({ nombres, apellidos }));
 
        msg.className = 'msg success';
        msg.textContent = '✓ Acceso concedido. Redirigiendo...';
 
        setTimeout(() => { window.location.href = 'seleccion.html'; }, 1200);
      } catch (e) {
        btn.disabled = false;
        msg.className = 'msg error';
        msg.textContent = 'Error al conectar. Intenta nuevamente.';
        console.error(e);
      }
    };
  </script>
</body>
</html>
