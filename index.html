<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CCTC 2026 – Registro</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --yellow: #FFE600;
      --yellow-glow: rgba(255,230,0,0.55);
      --black: #050505;
      --white: #ffffff;
    }
    body {
      min-height: 100vh;
      font-family: Impact, 'Arial Narrow', Arial, sans-serif;
      background: var(--black);
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      overflow-x: hidden;
      overflow-y: auto;
      padding-bottom: 48px;
    }

    /* FONDO */
    .bg-image {
      position: fixed; inset: 0;
      background: url('bg.webp') center center / cover no-repeat;
      opacity: 0.42;
      z-index: 0;
    }
    .bg-overlay {
      position: fixed; inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.25) 0%, rgba(0,0,0,0.7) 100%);
      z-index: 1;
    }

    /* CONTENIDO */
    .content {
      position: relative; z-index: 10;
      width: 100%; max-width: 480px;
      display: flex; flex-direction: column; align-items: center;
      padding: 44px 24px 0;
    }

    /* LOGOS */
    .logo-cctc  { width: 62%; max-width: 250px; margin-bottom: 6px; }
    .logo-200   { width: 84%; max-width: 340px; margin-bottom: 12px; }

    /* BADGE FECHA */
    .badge-date {
      background: var(--yellow);
      color: var(--black);
      font-family: Impact, sans-serif;
      font-size: 14px; letter-spacing: 2.5px;
      padding: 5px 22px; border-radius: 4px;
      margin-bottom: 30px;
      text-transform: uppercase;
    }

    /* CAJA FORMULARIO */
    .form-box {
      width: 100%;
      background: rgba(0,0,0,0.68);
      border: 2px solid var(--yellow);
      border-radius: 28px;
      padding: 34px 28px 30px;
      box-shadow: 0 0 30px rgba(255,230,0,0.18), 0 0 80px rgba(255,230,0,0.07);
      backdrop-filter: blur(8px);
    }

    /* USUARIO YA REGISTRADO */
    .returning-note { display: none; text-align: center; }
    .returning-name {
      font-size: 24px; color: var(--yellow);
      text-shadow: 0 0 14px var(--yellow-glow);
      margin-bottom: 6px; letter-spacing: 1px;
    }
    .returning-sub {
      font-family: Arial, sans-serif; font-size: 14px;
      color: rgba(255,255,255,0.5); margin-bottom: 26px; font-weight: 400;
    }

    /* FORM */
    .form-label {
      display: block;
      font-family: Arial, sans-serif;
      font-size: 11px; font-weight: 700; letter-spacing: 3px;
      color: var(--yellow); text-transform: uppercase; margin-bottom: 8px;
    }
    .form-group { margin-bottom: 20px; }
    input[type="text"] {
      width: 100%; padding: 13px 16px;
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,230,0,0.3);
      border-radius: 10px;
      color: var(--white);
      font-family: Arial, sans-serif; font-size: 16px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input[type="text"]::placeholder { color: rgba(255,255,255,0.22); }
    input[type="text"]:focus {
      border-color: var(--yellow);
      box-shadow: 0 0 0 3px rgba(255,230,0,0.1);
    }

    /* BOTONES */
    .btn-primary {
      width: 100%; padding: 15px; margin-top: 6px;
      background: var(--yellow); border: none; border-radius: 12px;
      color: var(--black);
      font-family: Impact, sans-serif; font-size: 19px; letter-spacing: 3px;
      text-transform: uppercase; cursor: pointer;
      box-shadow: 0 4px 28px rgba(255,230,0,0.28);
      transition: opacity .2s, transform .15s;
    }
    .btn-primary:hover { opacity: .9; transform: translateY(-2px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    .btn-secondary {
      width: 100%; padding: 12px; margin-top: 10px;
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.25);
      border-radius: 12px;
      color: rgba(255,255,255,0.45);
      font-family: Arial, sans-serif; font-size: 13px;
      cursor: pointer; transition: all .2s;
    }
    .btn-secondary:hover { border-color: rgba(255,255,255,0.5); color: var(--white); }

    .msg {
      margin-top: 14px; font-family: Arial, sans-serif;
      font-size: 13px; text-align: center; min-height: 18px; letter-spacing: .5px;
    }
    .msg.error   { color: #ff4444; }
    .msg.success { color: var(--yellow); }
    .msg.loading { color: rgba(255,255,255,0.4); }

    /* FOOTER IMEKA */
    .footer-imeka {
      position: relative; z-index: 10;
      display: flex; flex-direction: column; align-items: center;
      margin-top: 36px;
    }
    /* logo-imeka.webp: ~110px de ancho */
    .footer-imeka img { width: 110px; opacity: .92; }
    .footer-sub {
      font-family: Arial, sans-serif; font-size: 9px;
      letter-spacing: 3px; color: rgba(255,255,255,0.3);
      text-transform: uppercase; margin-top: 5px;
    }
  </style>
</head>
<body>

  <div class="bg-image"></div>
  <div class="bg-overlay"></div>

  <div class="content">
    <!-- LOGOS: reemplaza src con tus archivos .webp -->
    <img class="logo-cctc" src="LOGO1.webp"   alt="CCTC 2026"/>
    <div class="badge-date">Domingo 29 de Marzo</div>

    <div class="form-box">

      <!-- USUARIO YA REGISTRADO -->
      <div class="returning-note" id="returningNote">
        <p class="returning-name" id="returningName"></p>
        <p class="returning-sub">Ya tienes acceso al evento</p>
        <button class="btn-primary" onclick="goToSelection()">Ingresar al Stream</button>
        <button class="btn-secondary" onclick="clearUser()">Usar otro nombre</button>
      </div>

      <!-- NUEVO USUARIO -->
      <div id="formZone">
        <div class="form-group">
          <label class="form-label" for="nombres">Nombres</label>
          <input type="text" id="nombres" placeholder="Tu nombre" autocomplete="off"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="apellidos">Apellidos</label>
          <input type="text" id="apellidos" placeholder="Tus apellidos" autocomplete="off"/>
        </div>
        <button class="btn-primary" id="btnRegistrar" onclick="registrar()">Ingresar</button>
        <p class="msg" id="statusMsg"></p>
      </div>

    </div>
  </div>

  <div class="footer-imeka">
    <img src="ilogo.webp" alt="Imeka"/>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {

    apiKey: "AIzaSyAadDp06xXHRZtG_y_Xm9ie9CkeOpRoh0A",

    authDomain: "calendarmeka.firebaseapp.com",

    projectId: "calendarmeka",

    storageBucket: "calendarmeka.firebasestorage.app",

    messagingSenderId: "85672388532",

    appId: "1:85672388532:web:2ddd063b346518cc3a34e1",

    measurementId: "G-GBSYR41PHX"

  };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    window.addEventListener('DOMContentLoaded', () => {
      const saved = localStorage.getItem('chutana_user');
      if (saved) {
        const { nombres } = JSON.parse(saved);
        document.getElementById('formZone').style.display = 'none';
        document.getElementById('returningNote').style.display = 'block';
        document.getElementById('returningName').textContent = `¡Hola, ${nombres}!`;
      }
    });

    window.goToSelection = () => { window.location.href = 'seleccion.html'; };
    window.clearUser = () => {
      localStorage.removeItem('chutana_user');
      document.getElementById('returningNote').style.display = 'none';
      document.getElementById('formZone').style.display = 'block';
    };

    window.registrar = async () => {
      const nombres   = document.getElementById('nombres').value.trim();
      const apellidos = document.getElementById('apellidos').value.trim();
      const msg = document.getElementById('statusMsg');
      const btn = document.getElementById('btnRegistrar');
      if (!nombres || !apellidos) {
        msg.className = 'msg error'; msg.textContent = 'Completa todos los campos.'; return;
      }
      btn.disabled = true;
      msg.className = 'msg loading'; msg.textContent = 'Registrando...';
      try {
        await addDoc(collection(db, 'espectadores'), {
          nombres, apellidos, timestamp: serverTimestamp(),
          ua: navigator.userAgent.substring(0,80)
        });
        localStorage.setItem('chutana_user', JSON.stringify({ nombres, apellidos }));
        msg.className = 'msg success'; msg.textContent = '✓ Acceso concedido';
        setTimeout(() => { window.location.href = 'seleccion.html'; }, 1000);
      } catch(e) {
        btn.disabled = false;
        msg.className = 'msg error'; msg.textContent = 'Error de conexión. Intenta nuevamente.';
      }
    };
  </script>
</body>
</html>
