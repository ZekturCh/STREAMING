<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CCTC 2026 – Elige tu Vista</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --yellow: #FFE600;
      --pink:   #FF2B9D;
      --blue:   #3B3FE8;
      --black:  #050505;
      --white:  #ffffff;
    }
    body {
      min-height: 100vh;
      font-family: Impact, 'Arial Narrow', Arial, sans-serif;
      background: var(--black);
      display: flex; flex-direction: column; align-items: center;
      position: relative;
      overflow-x: hidden; overflow-y: auto;
      padding-bottom: 48px;
    }
 
    /* FONDO */
    .bg-image {
      position: fixed; inset: 0;
      background: url('fondo2.webp') center center / cover no-repeat;
      opacity: 0.42; z-index: 0;
    }
    .bg-overlay {
      position: fixed; inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.65) 100%);
      z-index: 1;
    }
 
    /* BLOBS DE COLOR */
    .blob {
      position: fixed; border-radius: 50%;
      filter: blur(60px); z-index: 2; pointer-events: none;
    }
    .blob-purple {
      width: 260px; height: 260px;
      background: rgba(120, 40, 200, 0.45);
      bottom: 20%; left: -60px;
    }
    .blob-red {
      width: 200px; height: 200px;
      background: rgba(200, 30, 80, 0.4);
      top: 38%; right: -40px;
    }
 
    /* HUELLA DE LLANTA — fondo decorativo abajo */
    .tire-track {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 220px; z-index: 2; pointer-events: none;
      background: repeating-linear-gradient(
        -15deg,
        transparent 0px, transparent 12px,
        rgba(180,30,100,0.07) 12px, rgba(180,30,100,0.07) 18px
      );
      mask-image: linear-gradient(to top, rgba(0,0,0,0.4) 0%, transparent 100%);
    }
 
    /* CONTENIDO */
    .content {
      position: relative; z-index: 10;
      width: 100%; max-width: 480px;
      display: flex; flex-direction: column; align-items: center;
      padding: 36px 20px 0;
    }
 
    /* LOGOS */
    .logo-cctc { width: 52%; max-width: 210px; margin-bottom: 5px; }
    .logo-200  { width: 78%; max-width: 320px; margin-bottom: 10px; }
 
    .badge-date {
      background: var(--yellow); color: var(--black);
      font-family: Impact, sans-serif;
      font-size: 13px; letter-spacing: 2px;
      padding: 5px 20px; border-radius: 4px;
      margin-bottom: 20px; text-transform: uppercase;
    }
 
    /* TÍTULO */
    .section-title {
      font-family: Impact, sans-serif;
      font-size: 32px; color: var(--white);
      text-align: center; letter-spacing: 2px;
      text-transform: uppercase; line-height: 1.1;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.5);
      margin-bottom: 28px;
    }
 
    /* DOS BOXES LADO A LADO */
.boxes-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}
 
    .stream-box {
      flex: 1; max-width: 200px;
      aspect-ratio: 9/16;
      border-radius: 24px;
      background: rgba(0,0,0,0.75);
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      padding-bottom: 18px;
      cursor: pointer; text-decoration: none;
      transition: transform .2s, box-shadow .25s;
      position: relative; overflow: hidden;
    }
    .stream-box:hover { transform: translateY(-4px); }
 
    .stream-box.pink {
      border: 2.5px solid var(--pink);
      box-shadow: 0 0 24px rgba(255,43,157,0.35), 0 0 60px rgba(255,43,157,0.12);
    }
    .stream-box.blue {
      border: 2.5px solid var(--blue);
      box-shadow: 0 0 24px rgba(59,63,232,0.4), 0 0 60px rgba(59,63,232,0.14);
    }
    .stream-box.pink:hover {
      box-shadow: 0 0 36px rgba(255,43,157,0.55), 0 0 80px rgba(255,43,157,0.2);
    }
    .stream-box.blue:hover {
      box-shadow: 0 0 36px rgba(59,63,232,0.6), 0 0 80px rgba(59,63,232,0.22);
    }

    .stream-box.yellow {
  border: 2.5px solid var(--yellow);
  box-shadow: 0 0 24px rgba(255,230,0,0.35), 0 0 60px rgba(255,230,0,0.12);
}

.stream-box.yellow:hover {
  box-shadow: 0 0 36px rgba(255,230,0,0.55), 0 0 80px rgba(255,230,0,0.2);
}

.stream-box.yellow .box-label {
  color: var(--yellow);
  text-shadow: 0 0 10px rgba(255,230,0,0.5);
}
 
    /* LABEL ABAJO DEL BOX */
    .box-label {
      font-family: Impact, sans-serif;
      font-size: 15px; letter-spacing: 2px;
      text-transform: uppercase; color: var(--white);
      text-align: center;
      text-shadow: 0 0 10px rgba(0,0,0,0.8);
    }
    .stream-box.pink .box-label { color: var(--pink); text-shadow: 0 0 10px rgba(255,43,157,0.5); }
    .stream-box.blue .box-label { color: #7B8CFF; text-shadow: 0 0 10px rgba(100,120,255,0.5); }
 
    /* LIVE DOT */
    .live-dot {
      width: 8px; height: 8px; border-radius: 50%;
      display: inline-block; margin-right: 6px;
      animation: blink 1.2s ease-in-out infinite;
    }
    .pink .live-dot  { background: var(--pink);  box-shadow: 0 0 7px var(--pink); }
    .blue .live-dot  { background: #7B8CFF; box-shadow: 0 0 7px #7B8CFF; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
 
    /* FOOTER IMEKA */
    .footer-imeka {
      position: relative; z-index: 10;
      display: flex; flex-direction: column; align-items: center;
      margin-top: 36px;
    }
    .footer-imeka img { width: 220px; opacity: .9; }
    .footer-sub {
      font-family: Arial, sans-serif; font-size: 9px;
      letter-spacing: 3px; color: rgba(255,255,255,0.3);
      text-transform: uppercase; margin-top: 5px;
    }
  </style>
</head>
<body>
 
  <div class="bg-image"></div>
  <div class="bg-overlay"></div>
  <div class="blob blob-purple"></div>
  <div class="blob blob-red"></div>
  <div class="tire-track"></div>
 
  <div class="content">
 
    <img class="logo-cctc" src="LOGO1.webp"  alt="CCTC 2026"/>
 
    <h1 class="section-title">Elige tu Experiencia<br>de Carrera</h1>
 
    <div class="boxes-row">
 
      <!-- STREAM 1: Cámaras - borde rosa -->
      <a class="stream-box pink" href="stream1.html">
        <p class="box-label"><span class="live-dot"></span>Cámaras</p>
      </a>
 
      <!-- STREAM 2: Dron - borde azul -->
      <a class="stream-box blue" href="stream2.html">
        <p class="box-label"><span class="live-dot"></span>Vista Aérea</p>
      </a>

      <a class="stream-box yellow" href="galeria.html">
  <p class="box-label">📸 Ver Galería</p>
</a>
 
    </div>
  </div>
 
  <div class="footer-imeka">
    <img src="ilogo.webp" alt="Imeka"/>
  </div>
 
  <script>
    if (!localStorage.getItem('chutana_user')) {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
  </script>
</body>
</html>
